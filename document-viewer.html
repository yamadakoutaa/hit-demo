*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f0f2f5;font-family:'Noto Sans JP',sans-serif;color:#1a1a2e;min-height:100vh;}

/* Toolbar */
.toolbar{position:sticky;top:0;z-index:100;background:#1a1a2e;color:#fff;display:flex;align-items:center;gap:12px;padding:10px 24px;box-shadow:0 2px 8px rgba(0,0,0,.3);}

.toolbar .doc-meta{font-size:11px;color:#8b949e;}
.toolbar button{background:#0f3460;border:none;color:#fff;padding:8px 16px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:background .2s;}
.toolbar button:hover{background:#16213e;}
.toolbar button.print-btn{background:#e94560;}
.toolbar button.print-btn:hover{background:#d63851;}

/* Paper */
.paper-wrap{max-width:900px;margin:32px auto;padding:0 16px 64px;}
.paper{background:#fff;border-radius:4px;box-shadow:0 2px 16px rgba(0,0,0,.08);padding:48px 56px;position:relative;min-height:600px;}
.paper::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#e94560,#0f3460);}

/* Typography */
.doc-h1{font-size:22px;font-weight:700;text-align:center;margin-bottom:8px;color:#1a1a2e;border-bottom:3px double #1a1a2e;padding-bottom:12px;}
.doc-h2{font-size:17px;font-weight:700;color:#0f3460;margin:28px 0 12px;padding:6px 0 6px 12px;border-left:4px solid #e94560;}
.doc-h3{font-size:14px;font-weight:700;color:#1a1a2e;margin:20px 0 8px;}
.doc-p{font-size:13px;line-height:1.9;margin-bottom:12px;}
.doc-note{font-size:11px;color:#666;background:#f8f9fa;border-left:3px solid #ccc;padding:8px 12px;margin:12px 0;border-radius:0 4px 4px 0;}
.doc-em{color:#e94560;font-weight:700;}

/* Tables */
.doc-table{width:100%;border-collapse:collapse;margin:12px 0 20px;font-size:12px;}
.doc-table th{background:#1a1a2e;color:#fff;padding:8px 12px;text-align:left;font-weight:500;font-size:11px;}
.doc-table td{padding:8px 12px;border-bottom:1px solid #e8e8e8;vertical-align:top;}

.doc-table tr:hover{background:#f0f4ff;}
.doc-table .num{text-align:right;font-family:monospace;font-size:12px;}
.doc-table .highlight-row{background:#fff3f5!important;font-weight:700;}

.stamp-box{width:72px;text-align:center;border:2px solid #c00;font-size:10px;}
.stamp-box .stamp-label{background:#c00;color:#fff;padding:2px 0;font-weight:700;}
.stamp-box .stamp-space{height:52px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:9px;}
.stamp-box .stamp-date{border-top:1px solid #c00;padding:2px 0;font-size:9px;color:#999;}

.header-info dd{padding:6px 12px;border-bottom:1px solid #ddd;}

.kpi-card{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:16px;text-align:center;position:relative;overflow:hidden;}

.kpi-card.ig::before{background:#E4405F;}
.kpi-card.x::before{background:#1DA1F2;}
.kpi-card.fb::before{background:#1877F2;}
.kpi-card.tk::before{background:#000;}

.kpi-card .kpi-change{font-size:11px;margin-top:4px;font-weight:700;}
.kpi-card .kpi-change.up{color:#28a745;}
.kpi-card .kpi-change.down{color:#e94560;}

.badge-low{background:#28a745;color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}

.flow-branch{display:flex;gap:16px;align-items:flex-start;}
.flow-branch .flow-option{background:#f0f4ff;border:2px solid #0f3460;padding:8px 16px;border-radius:6px;font-size:11px;text-align:center;flex:1;}

.tab-bar{display:flex;flex-wrap:wrap;border-bottom:2px solid #e8e8e8;margin:20px 0 0;}
.tab-btn{padding:8px 14px;background:transparent;border:none;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:#666;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;}
.tab-btn:hover{color:#1a1a2e;}
.tab-btn.active{color:#e94560;border-bottom-color:#e94560;font-weight:700;}
.tab-content{display:none;padding:20px 0;}
.tab-content.active{display:block;}

.checklist{list-style:none;margin:12px 0;}
.checklist li{padding:6px 0 6px 28px;position:relative;font-size:13px;line-height:1.6;}
.checklist li::before{content:'';position:absolute;left:0;top:8px;width:16px;height:16px;border:2px solid #0f3460;border-radius:3px;}
.checklist li.done::before{background:#0f3460;border-color:#0f3460;}

/* Comparison highlight */

/* Print */
@media print{

  .paper-wrap{margin:0;padding:0;}

}
</style>

// Tab switching
function switchTab(btn, tabId) {
  const parent = btn.closest('.paper') || document.getElementById('paperContent');
  // Find the tab-bar this button belongs to
  const tabBar = btn.parentElement;
  tabBar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Find sibling tab-contents
  let sibling = tabBar.nextElementSibling;
  const contents = [];
  while (sibling && !sibling.classList.contains('tab-bar') && !sibling.classList.contains('doc-h2')) {
    if (sibling.classList.contains('tab-content')) contents.push(sibling);
    sibling = sibling.nextElementSibling;
  }
  contents.forEach(c => c.classList.remove('active'));
  const target = document.getElementById(tabId);
  if (target) target.classList.add('active');
}

// Switch to attachment tab from link inside document body
function switchToAttachment(tabId) {
  const tabBar = document.querySelector('.tab-bar');
  if (!tabBar) return;
  const targetBtn = Array.from(tabBar.querySelectorAll('.tab-btn')).find(b => {
    const onclick = b.getAttribute('onclick');
    return onclick && onclick.includes(tabId);
  });
  if (targetBtn) {
    switchTab(targetBtn, tabId);
    window.scrollTo({top: 0, behavior: 'smooth'});
  }
}

// Close viewer (for iframe usage)
function closeViewer() {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({type:'closeDocViewer'}, '*');
  } else {
    window.history.back();
  }
}
