<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIT AI研修 デモリプレイ — Claude Code 実行画面</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#c9d1d9; font-family:'Noto Sans JP',sans-serif; height:100vh; overflow:hidden; }
.container { display:flex; height:100vh; }

/* Sidebar */
.sidebar { width:280px; background:#161b22; border-right:1px solid #30363d; display:flex; flex-direction:column; }
.sidebar-header { padding:20px 16px 12px; border-bottom:1px solid #30363d; }
.sidebar-header h2 { font-size:14px; color:#e94560; font-weight:700; letter-spacing:1px; }
.sidebar-header p { font-size:11px; color:#8b949e; margin-top:4px; }
.case-list { flex:1; overflow-y:auto; padding:8px; }
.case-btn { display:block; width:100%; padding:10px 12px; margin-bottom:4px; background:transparent; border:1px solid transparent; border-radius:6px; color:#c9d1d9; font-size:13px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; text-align:left; transition:all .15s; }
.case-btn:hover { background:#21262d; border-color:#30363d; }
.case-btn.active { background:#1a1a2e; border-color:#e94560; color:#fff; }
.case-btn .case-num { color:#e94560; font-weight:700; font-size:11px; display:block; margin-bottom:2px; }
.case-btn .case-title { font-size:13px; }
.case-btn .case-agent { font-size:10px; color:#8b949e; margin-top:2px; display:block; }

/* Controls */
.controls { display:flex; align-items:center; gap:12px; padding:8px 16px; background:#161b22; border-bottom:1px solid #30363d; }
.ctrl-btn { background:#21262d; border:1px solid #30363d; color:#c9d1d9; padding:6px 14px; border-radius:6px; font-size:12px; cursor:pointer; font-family:'Noto Sans JP',sans-serif; transition:all .15s; }
.ctrl-btn:hover { background:#30363d; }
.ctrl-btn.primary { background:#e94560; border-color:#e94560; color:#fff; }
.ctrl-btn.primary:hover { background:#d63851; }
.speed-label { font-size:11px; color:#8b949e; }
.speed-group { display:flex; gap:4px; }
.speed-btn { background:#21262d; border:1px solid #30363d; color:#8b949e; padding:4px 10px; border-radius:4px; font-size:11px; cursor:pointer; font-family:monospace; }
.speed-btn.active { background:#0f3460; border-color:#e94560; color:#fff; }
.progress-bar { flex:1; height:4px; background:#21262d; border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:#e94560; width:0; transition:width .3s; border-radius:2px; }
.status-text { font-size:11px; color:#8b949e; min-width:80px; text-align:right; }

/* Main area */
.main { flex:1; display:flex; flex-direction:column; }

/* Terminal */
.terminal-wrap { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.terminal-titlebar { background:#2d333b; padding:8px 12px; display:flex; align-items:center; gap:8px; }
.dot-t { width:12px; height:12px; border-radius:50%; }
.dot-t.r { background:#ff5f57; }
.dot-t.y { background:#febc2e; }
.dot-t.g { background:#28c840; }
.terminal-titlebar span { font-size:12px; color:#8b949e; margin-left:8px; font-family:monospace; }
.terminal { flex:1; background:#0d1117; padding:16px; overflow-y:auto; font-family:'SF Mono','Fira Code','Courier New',monospace; font-size:13px; line-height:1.6; white-space:pre-wrap; word-wrap:break-word; scroll-behavior:smooth; }
.terminal .line { min-height:1.6em; }
.terminal .banner { color:#e94560; }
.terminal .command { color:#79c0ff; }
.terminal .prompt-char { color:#3fb950; }
.terminal .thinking { color:#d2a8ff; }
.terminal .output { color:#c9d1d9; }
.terminal .cursor { display:inline-block; width:8px; height:16px; background:#e94560; animation:blink 1s step-end infinite; vertical-align:text-bottom; }
@keyframes blink { 50% { opacity:0; } }
.terminal .heading { color:#79c0ff; font-weight:bold; }
.terminal .table-line { color:#8b949e; }
.terminal .highlight { color:#ffa657; }

/* Welcome screen */
.welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#8b949e; text-align:center; }
.welcome h1 { font-size:24px; color:#e94560; margin-bottom:8px; }
.welcome p { font-size:14px; max-width:400px; line-height:1.8; }
.welcome .arrow { font-size:24px; margin-top:16px; color:#e94560; }

/* ===== Guide Panel ===== */
.guide-panel { display:none; flex:1; flex-direction:column; overflow:hidden; position:relative; }
.guide-panel.show { display:flex; }
.guide-hdr { background:linear-gradient(135deg,#1a2744 0%,#2d3f5e 100%); color:#fff; padding:16px 32px; display:flex; align-items:center; justify-content:space-between; }
.guide-hdr-left { display:flex; align-items:center; gap:14px; }
.guide-icon-box { width:44px; height:44px; background:rgba(255,255,255,.15); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; }
.guide-case-num { font-size:12px; font-weight:700; color:#f59e0b; letter-spacing:.1em; }
.guide-case-title { font-size:20px; font-weight:900; }
.guide-body { flex:1; padding:20px 32px 16px; display:flex; flex-direction:column; gap:16px; overflow-y:auto; background:#f9fafb; }
.g-agent-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.g-badge { background:#1a2744; color:#fff; font-size:11px; font-weight:700; padding:3px 10px; border-radius:16px; letter-spacing:.05em; }
.g-concept { background:#fef2f2; border:1px solid #ef4444; color:#991b1b; font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }
.g-problem { font-size:13px; color:#374151; line-height:1.6; }
.g-io-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; flex:1; min-height:0; }
.g-io-card { background:#fff; border-radius:10px; box-shadow:0 2px 12px rgba(0,0,0,.06); padding:16px; display:flex; flex-direction:column; overflow-y:auto; }
.g-io-card.g-input { border-left:3px solid #2563eb; }
.g-io-card.g-output { border-left:3px solid #10b981; }
.g-io-hdr { display:flex; align-items:center; gap:6px; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid #f3f4f6; font-size:12px; font-weight:700; color:#6b7280; letter-spacing:.1em; }
.g-io-icon { font-size:16px; }
.g-prompt { background:#e0f2fe; padding:12px 14px; border-radius:8px; font-size:14px; font-weight:500; color:#1a2744; line-height:1.6; }
.g-prompt-note { font-size:11px; color:#6b7280; margin-top:8px; }
.g-out-list { list-style:none; padding:0; }
.g-out-list li { padding:5px 0; font-size:12px; display:flex; align-items:flex-start; gap:6px; line-height:1.5; }
.g-out-list li::before { content:'>'; color:#10b981; font-weight:700; flex-shrink:0; }
.g-hi-bar { display:flex; gap:10px; flex-wrap:wrap; }
.g-hi { background:linear-gradient(135deg,#fef3c7,#fde68a); border:1px solid #f59e0b; color:#92400e; font-size:12px; font-weight:700; padding:6px 12px; border-radius:6px; display:flex; align-items:center; gap:4px; }
.g-hi-icon { font-size:14px; }
.g-spec-bar { display:flex; gap:16px; padding:8px 16px; background:#fff; border-radius:6px; border:1px solid #e5e7eb; flex-wrap:wrap; }
.g-spec { font-size:11px; color:#6b7280; }
.guide-play-area { display:flex; align-items:center; justify-content:flex-end; padding:0 32px 16px; background:#f9fafb; }
.guide-play-btn { background:#e94560; color:#fff; border:none; padding:12px 28px; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; font-family:'Noto Sans JP',sans-serif; box-shadow:0 4px 16px rgba(233,69,96,.3); transition:all .2s; display:flex; align-items:center; gap:8px; }
.guide-play-btn:hover { background:#d63851; transform:translateY(-2px); box-shadow:0 6px 20px rgba(233,69,96,.4); }

/* Document preview overlay */
.doc-overlay { position:fixed; top:0; left:0; right:0; bottom:0; z-index:200; display:none; }
.doc-overlay.show { display:flex; }
.doc-backdrop { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.5); }
.doc-panel { position:relative; z-index:1; margin-left:280px; flex:1; display:flex; flex-direction:column; background:#f0f2f5; animation:slideIn .4s ease; }
@keyframes slideIn { from{transform:translateY(30px);opacity:0;} to{transform:translateY(0);opacity:1;} }
.doc-panel-header { background:#1a1a2e; color:#fff; display:flex; align-items:center; gap:12px; padding:10px 20px; }
.doc-panel-header .dp-badge { background:#e94560; padding:4px 10px; border-radius:4px; font-size:11px; font-weight:700; }
.doc-panel-header .dp-title { flex:1; font-size:14px; font-weight:700; }
.doc-panel-header button { background:#0f3460; border:none; color:#fff; padding:6px 14px; border-radius:6px; font-size:12px; cursor:pointer; font-family:'Noto Sans JP',sans-serif; }
.doc-panel-header button:hover { background:#16213e; }
.doc-panel-header button.dp-close { background:#e94560; }
.doc-panel-header button.dp-close:hover { background:#d63851; }
.doc-iframe { flex:1; border:none; width:100%; }

/* Converting animation */
.converting-msg { display:inline-flex; align-items:center; gap:8px; color:#d2a8ff; }
.converting-msg .spinner { display:inline-block; width:14px; height:14px; border:2px solid #d2a8ff; border-top-color:transparent; border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg);} }
</style>
</head>
<body>
<div class="container">
  <nav class="sidebar">
    <div class="sidebar-header">
      <h2>HIT AI DEMO</h2>
      <p>Claude Code 実行リプレイ</p>
    </div>
    <div class="case-list" id="caseList"></div>
  </nav>
  <div class="main">
    <div class="controls">
      <button class="ctrl-btn primary" id="btnPlay" onclick="handlePlayBtn()">&#9654; 再生</button>
      <button class="ctrl-btn" id="btnRestart" onclick="restart()">&#8634; 最初から</button>
      <span class="speed-label">速度:</span>
      <div class="speed-group">
        <button class="speed-btn" data-speed="0.5" onclick="setSpeed(0.5,this)">0.5x</button>
        <button class="speed-btn active" data-speed="1" onclick="setSpeed(1,this)">1x</button>
        <button class="speed-btn" data-speed="2" onclick="setSpeed(2,this)">2x</button>
        <button class="speed-btn" data-speed="4" onclick="setSpeed(4,this)">4x</button>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <span class="status-text" id="statusText">待機中</span>
    </div>

    <!-- Guide Panel (case explanation) -->
    <div class="guide-panel" id="guidePanel">
      <div class="guide-hdr">
        <div class="guide-hdr-left">
          <div class="guide-icon-box" id="gIcon"></div>
          <div>
            <div class="guide-case-num" id="gNum"></div>
            <div class="guide-case-title" id="gTitle"></div>
          </div>
        </div>
      </div>
      <div class="guide-body">
        <div class="g-agent-row" id="gAgentRow"></div>
        <div class="g-io-grid">
          <div class="g-io-card g-input">
            <div class="g-io-hdr"><span class="g-io-icon">&#x1F4AC;</span> INPUT</div>
            <div class="g-prompt" id="gPrompt"></div>
            <div class="g-prompt-note" id="gPromptNote"></div>
          </div>
          <div class="g-io-card g-output">
            <div class="g-io-hdr"><span class="g-io-icon" id="gOutIcon">&#x1F4C4;</span> OUTPUT</div>
            <ul class="g-out-list" id="gOutList"></ul>
          </div>
        </div>
        <div class="g-hi-bar" id="gHighlights"></div>
        <div class="g-spec-bar" id="gSpecs"></div>
      </div>
      <div class="guide-play-area">
        <button class="guide-play-btn" onclick="startDemo()">&#9654; デモ再生</button>
      </div>
    </div>

    <!-- Terminal -->
    <div class="terminal-wrap" id="terminalWrap">
      <div class="terminal-titlebar">
        <div class="dot-t r"></div><div class="dot-t y"></div><div class="dot-t g"></div>
        <span id="titlebarText">Terminal — zsh</span>
      </div>
      <div class="terminal" id="terminal">
        <div class="welcome">
          <h1>HIT AI業務自動化デモ</h1>
          <p>左のケース一覧から、再生したいデモを選んでください。<br>Claude Code がリアルタイムで出力を生成する様子をシミュレーションします。</p>
          <div class="arrow">&#8592;</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Document Preview Overlay -->
<div class="doc-overlay" id="docOverlay">
  <div class="doc-backdrop" onclick="closeDocPreview()"></div>
  <div class="doc-panel">
    <div class="doc-panel-header">
      <span class="dp-badge" id="dpBadge">文書</span>
      <span class="dp-title" id="dpTitle">文書プレビュー</span>
      <button onclick="window.open(document.getElementById('docIframe').src,'_blank')">&#x2197; 別窓で開く</button>
      <button class="dp-close" onclick="closeDocPreview()">&#x2715; 閉じる</button>
    </div>
    <iframe class="doc-iframe" id="docIframe"></iframe>
  </div>
</div>

<script>

const CASES = [
  {

    prompt:'デジタルコンテンツ制作業務の契約締結伺いを作成してください。proposal-drafterの出力を参照してください。案件名「令和8年度観光デジタルコンテンツ制作及びSNS運用業務」、予算800万円（税込）、公募型プロポーザル方式。',
    lines:[
'# 起 案 書','','---','','## ■ 起案書ヘッダー','','| 項目 | 内容 |','|------|------|','| 文書番号 | [要記入: 文書番号] |','| 起案日 | 令和８年４月22日 |','| 決裁区分 | 会長決裁 ※推定（契約金額が高額のため会長決裁と推定） |','| 起案部署 | 企画総務部 |','| 起案者 | [要記入: 起案者氏名] |','','---','','## ■ 件名','','令和８年度広島県観光デジタルコンテンツ制作及びSNS運用業務委託契約の締結について','','---','','## ■ 要旨（起案理由）','','令和８年度広島県観光デジタルコンテンツ制作及びSNS運用業務について、公募型プロポーザル方式により受託候補者を選定した結果、下記のとおり最優秀提案者が決定したので、当該事業者と業務委託契約を締結したく伺うものである。','','本業務は、広島県の観光魅力を効果的に伝えるデジタルコンテンツ（動画・静止画・記事等）の制作及びSNSアカウントの戦略的運用を通じて、広島県への来訪意欲の醸成及び観光消費額の向上を図ることを目的とするものであり、令和８年度事業計画に基づき実施するものである。','','---','','## ■ 内容','','### １ 契約の目的','','広島県の観光資源（瀬戸内海の多島美、世界遺産、豊かな食文化等）を題材としたデジタルコンテンツの企画・制作、SNSアカウントの運用・管理、インフルエンサーを活用した情報拡散及び効果測定を行うもの。','','### ２ 契約方式及び選定経過','','（１）契約方式','　　公募型プロポーザル方式による最優秀提案者との随意契約','','（２）選定経過','','| 項目 | 内容 |','|------|------|','| 公告日 | 令和８年４月１日 |','| 参加資格確認申請 | 令和８年４月８日締切 |','| 提案書提出 | 令和８年４月14日締切 |','| 提案書提出者数 | [要記入: 応募者数]社 |','| 審査会開催日 | [要記入: 審査会日付] |','','### ３ 契約の相手方','','| 項目 | 内容 |','|------|------|','| 名称 | [要記入: 契約相手方の正式名称] |','| 所在地 | [要記入: 所在地] |','| 代表者 | [要記入: 代表者名] |','','### ４ 契約金額','','| 項目 | 金額 |','|------|------|','| 契約金額（税込） | [要記入: 契約金額]円 |','| 契約金額（税抜） | [要記入: 契約金額（税抜）]円 |','','※ 事業予算額 金8,000,000円（税込）の範囲内であることを確認済みである。','','...(以下、添付書類・決裁欄が続く — 全155行)'

    lines:[
'# 「ひろしま秋の食と酒まつり2026」広報文一式（v2）','','> **v2 改訂内容**: リファレンスに基づき、HIT実際の広報パターンに準拠して全面改訂。','> **v1からの主な変更点**:','> - プレスリリース: ひろくまセクション・観光大使プログラム言及を追加','> - X投稿: ／ ＼フレーミング＋フォロー&RT形式に変更','> - Instagram: 3層ハッシュタグ戦略適用','> - Web記事: Dive! Hiroshima特集記事パターンに準拠','','> **機密性チェック結果**: 本文中に以下の未公開・未確定情報を検出し、プレースホルダー化済み。','> - [確定後に記入: ゲストシェフ名] — 出演者が未確定','> - [解禁後に記入: 来場見込数] — 来場見込が未公表','> - [確定後に記入: 特別協賛企業名] — 協賛企業が交渉中','','---','','# 形式1: プレスリリース','','---','','報道関係者各位','令和８年[解禁後に記入: 発信日]','一般社団法人広島県観光連盟','','## 広島の「食」と「酒」を五感で楽しむ！「ひろしま秋の食と酒まつり2026」を初開催！！','','〜 瀬戸内の牡蠣、県内蔵元の地酒、お好み焼き名店が広島城に大集結。ひろくまも来るけぇね！ 〜','','一般社団法人広島県観光連盟（所在地：広島市中区、会長：[要記入: 会長名]、以下「HIT」）は、','令和８年10月[解禁後に記入: 開催日程]に、広島城二の丸広場及び周辺エリアにおいて、','「ひろしま秋の食と酒まつり2026」を初開催いたします。','','### ■ 開催概要','','| 項目 | 内容 |','|------|------|','| イベント名 | ひろしま秋の食と酒まつり2026 |','| 開催日程 | 令和８年10月[解禁後に記入: 開催日程] |','| 会場 | 広島城二の丸広場及び周辺エリア |','| 来場見込 | [解禁後に記入: 来場見込数]人 |','| 入場料 | 無料（飲食は有料。フードチケット制） |','','# 形式2: SNS投稿文（X / Instagram / Facebook）','','# 形式3: Web記事（Dive! Hiroshima 特集記事パターン準拠）','','...(全473行 — プレスリリース・SNS3媒体・Web記事の5形式を同時生成)'
    ]
  },
  {
    id:3, title:'ナレッジ共有', agent:'knowledge-base',

// ===== Build sidebar =====
const caseList = document.getElementById('caseList');
CASES.forEach(c => {
  const btn = document.createElement('button');

  btn.innerHTML = `<span class="case-num">CASE ${String(c.id).padStart(2,'0')}</span><span class="case-title">${c.title}</span><span class="case-agent">${c.agent}</span>`;

// ===== Select case → show guide =====
function selectCase(c) {
  stop();
  closeDocPreview();
  currentCase = c;
  lineIndex = 0;
  phase = 'idle';
  view = 'guide';

  // Update sidebar
  document.querySelectorAll('.case-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${c.id}`).classList.add('active');

  // Update controls
  document.getElementById('btnPlay').innerHTML = '&#9654; \u30C7\u30E2\u518D\u751F';
  document.getElementById('statusText').textContent = '\u89E3\u8AAC\u8868\u793A\u4E2D';
  document.getElementById('progressFill').style.width = '0%';

  // Show guide, hide terminal
  showGuide(c);
}

// ===== Populate & show guide panel =====
function showGuide(c) {
  const guide = document.getElementById('guidePanel');
  const termWrap = document.getElementById('terminalWrap');
  guide.classList.add('show');
  termWrap.style.display = 'none';

  const data = GUIDE_DATA[c.id];

  // Header
  document.getElementById('gIcon').textContent = data.icon;
  document.getElementById('gNum').textContent = `CASE ${String(c.id).padStart(2,'0')}`;
  document.getElementById('gTitle').textContent = c.title;

  // Agent row
  const agentRow = document.getElementById('gAgentRow');
  let agentHTML = data.agents.map(a =>
    `<span class="g-badge"${a.style ? ` style="${a.style}"` : ''}>${a.name}</span>`
  ).join('');
  if (data.concept) {
    agentHTML += '<span class="g-concept">CONCEPT DEMO</span>';
  }
  agentHTML += `<span class="g-problem">${data.problem}</span>`;
  agentRow.innerHTML = agentHTML;

  // Input
  document.getElementById('gPrompt').textContent = data.promptText;
  document.getElementById('gPromptNote').innerHTML = data.promptNote;

  // Output
  document.getElementById('gOutIcon').textContent = data.outIcon;
  document.getElementById('gOutList').innerHTML = data.outputs.map(o => `<li>${o}</li>`).join('');

  // Highlights
  document.getElementById('gHighlights').innerHTML = data.highlights.map(h =>
    `<span class="g-hi"><span class="g-hi-icon">${h.icon}</span> ${h.text}</span>`
  ).join('');

  // Specs
  document.getElementById('gSpecs').innerHTML = data.specs.map(s =>
    `<span class="g-spec">${s}</span>`
  ).join('');
}

  addLine('', '');

  // Update controls
  document.getElementById('btnPlay').innerHTML = '&#9646;&#9646; \u4e00\u6642\u505c\u6b62';
  document.getElementById('statusText').textContent = '\u5b9f\u884c\u4e2d...';

  // Reset state and auto-play
  lineIndex = 0;
  phase = 'idle';
  isPlaying = true;

  setTimeout(() => play(), 500);
}

// ===== Terminal functions =====
function addLine(text, cls) {
  const term = document.getElementById('terminal');
  const div = document.createElement('div');
  div.className = `line ${cls||''}`;

  if (cls === 'heading' || text.startsWith('#')) {
    div.className = 'line heading';
  } else if (text.startsWith('|') || text.startsWith('---')) {
    div.className = 'line table-line';
  } else if (text.startsWith('>') || text.startsWith('\u203B') || text.includes('...')) {
    div.className = 'line highlight';
  }

  div.textContent = text;
  term.appendChild(div);
  term.scrollTop = term.scrollHeight;
}

function play() {
  if (!currentCase) return;
  isPlaying = true;
  document.getElementById('btnPlay').innerHTML = '&#9646;&#9646; \u4e00\u6642\u505c\u6b62';
  document.getElementById('statusText').textContent = '\u5b9f\u884c\u4e2d...';

  if (phase === 'idle') {
    phase = 'command';
    // Show command
    addLine(`  $ claude -p "${currentCase.prompt.substring(0,80)}..."`, 'command');
    addLine('', '');

    // Show thinking animation
    let dots = 0;
    const thinkDiv = document.createElement('div');
    thinkDiv.className = 'line thinking';
    thinkDiv.id = 'thinkingLine';
    thinkDiv.textContent = '  \u2728 Thinking...';
    document.getElementById('terminal').appendChild(thinkDiv);

    const thinkTimer = setInterval(() => {
      dots = (dots + 1) % 4;
      thinkDiv.textContent = '  \u2728 Thinking' + '.'.repeat(dots + 1);
    }, 300);

    setTimeout(() => {
      clearInterval(thinkTimer);
      thinkDiv.remove();
      addLine('', '');
      phase = 'output';
      lineIndex = 0;
      streamOutput();
    }, 2000 / speed);
  } else if (phase === 'output') {
    streamOutput();
  }
}

function streamOutput() {
  if (!isPlaying || !currentCase || phase !== 'output') return;
  if (lineIndex >= currentCase.lines.length) {
    phase = 'done';
    addLine('', '');
    addLine('  \u2705 Done. Output saved.', 'thinking');
    addLine('', '');
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('statusText').textContent = '\u5b8c\u4e86';
    document.getElementById('btnPlay').innerHTML = '&#9654; \u518d\u751f';
    isPlaying = false;
    // Auto-trigger document preview
    triggerDocConversion();
    return;
  }

  addLine(currentCase.lines[lineIndex], '');
  lineIndex++;

  // Update progress
  const pct = Math.round((lineIndex / currentCase.lines.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';

  // Variable delay based on content
  let delay = 60 / speed;
  const line = currentCase.lines[lineIndex - 1];
  if (line === '' || line === '---') delay = 20 / speed;
  else if (line.startsWith('#')) delay = 120 / speed;
  else if (line.startsWith('|')) delay = 40 / speed;

  timer = setTimeout(streamOutput, delay);
}

function stop() {
  isPlaying = false;
  if (timer) { clearTimeout(timer); timer = null; }
  if (view === 'terminal') {
    document.getElementById('btnPlay').innerHTML = '&#9654; \u518d\u751f';
  }
}

// ===== Play button handler =====
function handlePlayBtn() {
  if (view === 'guide') {
    startDemo();
  } else if (view === 'terminal') {
    if (isPlaying) {
      stop();
      document.getElementById('statusText').textContent = '\u4e00\u6642\u505c\u6b62';
    } else {
      if (phase === 'done') {
        restart();
      } else {
        play();
      }
    }
  }
}

function restart() {
  if (currentCase) selectCase(currentCase);
}

function setSpeed(s, el) {
  speed = s;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

// ===== Document preview =====
function triggerDocConversion() {
  if (!currentCase) return;
  const term = document.getElementById('terminal');
  setTimeout(() => {
    addLine('', '');
    const convertDiv = document.createElement('div');
    convertDiv.className = 'line';
    convertDiv.innerHTML = '  <span class="converting-msg"><span class="spinner"></span> \u6587\u66F8\u30D5\u30A9\u30FC\u30DE\u30C3\u30C8\u306B\u5909\u63DB\u4E2D...</span>';
    term.appendChild(convertDiv);
    term.scrollTop = term.scrollHeight;
    document.getElementById('statusText').textContent = '\u5909\u63DB\u4E2D...';

    setTimeout(() => {
      convertDiv.innerHTML = '  <span style="color:#3fb950;">&#x2705; \u6587\u66F8\u30D5\u30A9\u30FC\u30DE\u30C3\u30C8\u3078\u306E\u5909\u63DB\u304C\u5B8C\u4E86\u3057\u307E\u3057\u305F</span>';
      addLine('', '');
      const linkDiv = document.createElement('div');
      linkDiv.className = 'line';
      linkDiv.innerHTML = '  <span style="color:#79c0ff;cursor:pointer;text-decoration:underline;" onclick="openDocPreview()">&#x1F4C4; ' + DOC_FORMATS[currentCase.id].label + '\u3092\u8868\u793A</span>';
      term.appendChild(linkDiv);
      term.scrollTop = term.scrollHeight;
      document.getElementById('statusText').textContent = '\u5B8C\u4E86';

      setTimeout(() => openDocPreview(), 600);
    }, 1800 / speed);
  }, 1200 / speed);
}

function openDocPreview() {
  if (!currentCase) return;
  const fmt = DOC_FORMATS[currentCase.id];
  document.getElementById('dpBadge').textContent = fmt.badge;
  document.getElementById('dpTitle').textContent = fmt.label;
  document.getElementById('docIframe').src = 'document-viewer.html?case=' + currentCase.id;
  document.getElementById('docOverlay').classList.add('show');
}

function closeDocPreview() {
  document.getElementById('docOverlay').classList.remove('show');
  document.getElementById('docIframe').src = '';
}

// Listen for close message from iframe
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'closeDocViewer') closeDocPreview();
});

// ===== Keyboard shortcuts =====
document.addEventListener('keydown', e => {
  // Close doc preview on Escape
  if (e.code === 'Escape') { closeDocPreview(); return; }
  // Don't handle shortcuts if doc preview is open
  if (document.getElementById('docOverlay').classList.contains('show')) return;

  if (e.code === 'Space') {
    e.preventDefault();
    handlePlayBtn();
  }
  if (e.code === 'KeyR') restart();
  if (e.code === 'ArrowDown' || e.code === 'ArrowRight') {
    const idx = CASES.findIndex(c => c === currentCase);
    if (idx < CASES.length - 1) selectCase(CASES[idx + 1]);
  }
  if (e.code === 'ArrowUp' || e.code === 'ArrowLeft') {
    const idx = CASES.findIndex(c => c === currentCase);
    if (idx > 0) selectCase(CASES[idx - 1]);
  }
});
</script>
